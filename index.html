<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Азбука</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- Главный экран -->
    <section id="homeScreen" class="screen active">

        <div class="logo">
            <h1>АЗБУКА</h1>
            <p>Изучаем русский алфавит</p>
        </div>

        <button id="startButton" class="mainButton">
            Начать
        </button>

    </section>



    <!-- Экран букв -->

    <section id="lettersScreen" class="screen">

        <div class="header">

            <button id="backHomeButton" class="backButton">
                ←
            </button>

            <h2>Выбери букву</h2>

            <button id="settingsButton" class="settingsButton" type="button" aria-label="Открыть настройки">
                ⚙
            </button>

        </div>

        <div id="lettersGrid" class="lettersGrid">

        </div>

    </section>

    <div id="settingsOverlay" class="settingsOverlay hidden">
        <div class="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <h3 id="settingsTitle">Для родителей</h3>
            <p class="settingsDescription">Управление прогрессом ребёнка.</p>
            <button id="showResetConfirmButton" class="settingsActionButton" type="button">
                Сбросить весь прогресс
            </button>

            <div id="resetConfirmBlock" class="resetConfirmBlock hidden">
                <p>Сбросить весь прогресс? Все пройденные буквы снова станут непройденными</p>
                <div class="settingsActions">
                    <button id="cancelResetButton" class="secondaryButton" type="button">Отмена</button>
                    <button id="confirmResetButton" class="dangerButton" type="button">Сбросить</button>
                </div>
            </div>

            <button id="closeSettingsButton" class="closeSettingsButton" type="button">Закрыть</button>
        </div>
    </div>



    <!-- Экран буквы -->

    <section id="letterScreen" class="screen">

        <div class="header">

            <button id="backLettersButton" class="backButton">
                ← Назад
            </button>

            <h2 id="letterTitle">
                Буква А
            </h2>

        </div>

        <div class="bigLetter" id="bigLetter">
            А
        </div>

        <div class="letterImage" id="letterImage">
        </div>

        <div id="wordsBlock" class="wordsBlock">

        </div>

        <button id="playGameButton" class="playButton">
            Играть
        </button>

    </section>




    <!-- Игра -->

    <section id="gameScreen" class="screen">

        <div class="header">

            <button id="backLetterButton" class="backButton">
                ←
            </button>

            <h2 id="gameScreenTitle" class="gameScreenTitle">
                <span id="gameScreenTitleText">Найди предметы на букву</span>
                <span id="gameScreenTitleLetter" class="gameScreenTitleLetter">А</span>
            </h2>

        </div>

        <div class="gameTitle">

            Найди 2 предмета

        </div>

        <div id="findObjectCards" class="findObjectCards" aria-label="Карточки предметов"></div>

        <div id="findObjectCelebration" class="findObjectCelebration hidden" aria-live="polite"></div>

        <button id="repeatRoundButton" class="repeatRoundButton" type="button">
            Новые карточки
        </button>

        <button id="backToLettersButton" class="toLettersButton hidden" type="button">
            К буквам
        </button>

        <div id="balloons" class="balloons hidden">

        </div>

        <div id="confetti"></div>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
